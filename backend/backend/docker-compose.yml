version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: nextstep-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nextstep_db
      POSTGRES_USER: shruti
      POSTGRES_PASSWORD: 8125
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: